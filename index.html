<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b1628;--card:#111d33;--card-border:#1a2d4d;
  --accent:#00e4a0;--accent-glow:rgba(0,228,160,0.15);--accent2:#00b4d8;
  --danger:#ff4757;--gold:#ffd700;--text:#e8edf5;--text-dim:#7a8ba7;
  --donation:#ff6b9d;
}
body{font-family:'Outfit','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}.screen.active{display:block;animation:screenIn .5s ease}
@keyframes screenIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
.home-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;position:relative;overflow:hidden}
.home-screen.active{display:flex}
.home-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(0,228,160,0.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(0,180,216,0.06) 0%,transparent 50%),var(--bg);z-index:0}
.home-content{position:relative;z-index:1;max-width:520px;width:100%}
.logo-icon{font-size:4rem;margin-bottom:12px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.logo-title{font-size:3.2rem;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:1rem;color:var(--text-dim);margin-top:4px;letter-spacing:2px;text-transform:uppercase;font-weight:500}
.tagline{font-size:1.05rem;color:var(--text-dim);line-height:1.7;margin:20px 0 30px;font-weight:400}
.tagline em{color:var(--accent);font-style:normal;font-weight:600}

.total-stats{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.total-stat{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:12px 20px;text-align:center;min-width:90px}
.total-stat .ts-val{font-size:1.4rem;font-weight:700}
.total-stat .ts-val.don{color:var(--donation)}
.total-stat .ts-val.pts{color:var(--accent)}
.total-stat .ts-label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-top:2px}

.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;width:100%}
.level-btn{background:var(--card);border:1.5px solid var(--card-border);border-radius:16px;padding:14px 12px;cursor:pointer;transition:all .25s;text-align:left;position:relative;overflow:hidden}
.level-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .25s}
.level-btn:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,228,160,0.12)}
.level-btn:hover::before{opacity:1}
.level-btn.locked{opacity:.35;pointer-events:none}
.level-btn.cleared{border-color:rgba(0,228,160,0.3)}
.level-btn.cleared::before{opacity:1;background:linear-gradient(90deg,var(--gold),#ffaa00)}
.level-btn .lv-num{font-size:.65rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px}
.level-btn.cleared .lv-num{color:var(--gold)}
.level-btn .lv-score{font-size:1.2rem;font-weight:700;color:var(--text)}
.level-btn .lv-desc{font-size:.72rem;color:var(--text-dim);margin-top:2px}
.level-btn .lv-words{font-size:.65rem;color:var(--text-dim);margin-top:4px;opacity:.7}
.level-btn .lv-progress{margin-top:8px;height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.level-btn .lv-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .5s ease}
.level-btn.cleared .lv-bar{background:linear-gradient(90deg,var(--gold),#ffaa00)}
.home-footer{font-size:.75rem;color:var(--text-dim);margin-top:16px;opacity:.5}

/* QUIZ */
.quiz-screen{display:none;flex-direction:column;min-height:100vh}
.quiz-screen.active{display:flex}
.quiz-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(17,29,51,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--card-border);position:sticky;top:0;z-index:50}
.back-btn{background:none;border:1px solid var(--card-border);color:var(--text-dim);border-radius:10px;padding:7px 12px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .2s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.ql-center{text-align:center}
.ql-label{font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:700}
.ql-score{font-size:.8rem;color:var(--text-dim);font-weight:500}
.quiz-stats{display:flex;gap:14px;align-items:center}
.stat{text-align:center}
.stat .s-val{font-size:1.1rem;font-weight:700;color:var(--text)}
.stat .s-label{font-size:.55rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.stat.don .s-val{color:var(--donation)}

.prog-track{height:3px;background:var(--card)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease}

/* Ocean */
.world{flex:0 0 auto;height:200px;position:relative;overflow:hidden}
.world.ocean-theme{background:linear-gradient(180deg,rgba(10,36,99,0.9) 0%,rgba(15,52,96,0.95) 50%,rgba(22,33,62,1) 100%)}
.world.ocean-theme::after{content:'';position:absolute;bottom:0;left:0;right:0;height:35px;background:linear-gradient(transparent,rgba(194,154,86,0.15));pointer-events:none}
.world.forest-theme{background:linear-gradient(180deg,rgba(15,35,20,0.95) 0%,rgba(20,55,30,0.9) 40%,rgba(30,70,35,0.85) 70%,rgba(45,80,40,1) 100%)}
.world.forest-theme::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,rgba(60,40,20,0.3));pointer-events:none}
.oc{position:absolute;pointer-events:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));z-index:1}
.oc.swim{animation:swim 4s ease-in-out infinite}
@keyframes swim{0%,100%{transform:translateX(0) translateY(0)}25%{transform:translateX(12px) translateY(-6px)}75%{transform:translateX(-12px) translateY(6px)}}
.oc.hop{animation:hop 2s ease-in-out infinite}
@keyframes hop{0%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}60%{transform:translateY(0)}80%{transform:translateY(-4px)}}
.oc.sway-tree{animation:treeSway 5s ease-in-out infinite}
@keyframes treeSway{0%,100%{transform:rotate(0deg)}25%{transform:rotate(2deg)}75%{transform:rotate(-2deg)}}
.oc.flutter{animation:flutter 3s ease-in-out infinite}
@keyframes flutter{0%,100%{transform:translateY(0) translateX(0)}25%{transform:translateY(-5px) translateX(3px)}50%{transform:translateY(-2px) translateX(-3px)}75%{transform:translateY(-7px) translateX(2px)}}
.oc-enter{animation:cpop .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes cpop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.ob{position:absolute;border-radius:50%;background:rgba(255,255,255,0.08);animation:bup linear infinite;pointer-events:none}
@keyframes bup{from{transform:translateY(0);opacity:.5}to{transform:translateY(-220px);opacity:0}}
/* Fireflies for forest */
.firefly{position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(255,255,100,0.7);pointer-events:none;animation:fireflyFloat 6s ease-in-out infinite;box-shadow:0 0 6px rgba(255,255,100,0.5)}
@keyframes fireflyFloat{0%,100%{transform:translate(0,0);opacity:.3}25%{transform:translate(15px,-10px);opacity:.8}50%{transform:translate(-10px,-20px);opacity:.4}75%{transform:translate(20px,-5px);opacity:.9}}
/* Falling leaves */
.leaf{position:absolute;pointer-events:none;animation:leafFall linear infinite;font-size:14px}
@keyframes leafFall{0%{transform:translateY(-20px) rotate(0deg);opacity:.7}100%{transform:translateY(220px) rotate(360deg);opacity:0}}
.sw{position:absolute;bottom:0;pointer-events:none;animation:sway 3.5s ease-in-out infinite;transform-origin:bottom center}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}

/* Quiz body */
.quiz-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px 32px}
.q-counter{font-size:.78rem;color:var(--text-dim);margin-bottom:10px;font-weight:500}
.q-word{font-size:2.2rem;font-weight:800;letter-spacing:-1px;margin-bottom:4px;text-align:center;color:#fff}
.q-word-row{display:flex;align-items:center;justify-content:center;gap:10px}
.sound-btn{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;width:42px;height:42px;font-size:1.2rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sound-btn:hover{background:rgba(0,228,160,0.15);border-color:var(--accent)}
.sound-btn:active{transform:scale(0.9)}
.sound-btn.playing{background:rgba(0,228,160,0.2);border-color:var(--accent);animation:pulse .6s ease}
.q-pos{font-size:.82rem;color:var(--accent);margin-bottom:20px;font-weight:600}
.opts{width:100%;max-width:480px;display:flex;flex-direction:column;gap:9px}
.opt{width:100%;background:var(--card);border:1.5px solid var(--card-border);border-radius:14px;padding:13px 18px;color:var(--text);font-family:'Noto Sans KR','Outfit',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px}
.opt .on{width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--text-dim);flex-shrink:0}
.opt:hover:not(:disabled){border-color:rgba(0,228,160,0.4);background:rgba(0,228,160,0.05);transform:translateX(4px)}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--accent);background:rgba(0,228,160,0.1);box-shadow:0 0 20px var(--accent-glow)}
.opt.correct .on{background:var(--accent);color:var(--bg)}
.opt.wrong{border-color:var(--danger);background:rgba(255,71,87,0.08);opacity:.7}
.fb{margin-top:18px;text-align:center;min-height:40px}
.fb-msg{font-size:.95rem;font-weight:600;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nxt{margin-top:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;padding:12px 36px;color:var(--bg);font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;display:none;box-shadow:0 4px 20px rgba(0,228,160,0.25)}
.nxt:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,228,160,0.35)}
.nxt.show{display:inline-block;animation:fu .3s ease}

/* Overlays */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:300;animation:fi .3s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.ov-card{border-radius:24px;padding:36px;text-align:center;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:pu .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes pu{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.don-card{background:linear-gradient(135deg,var(--card),#162040);border:1.5px solid rgba(255,107,157,0.3)}
.don-card .d-icon{font-size:3.5rem;margin-bottom:10px}
.don-card h2{font-size:1.4rem;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,var(--donation),#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.don-card p{color:var(--text-dim);font-size:.85rem;margin-bottom:16px;line-height:1.6}
.don-card .dp{font-size:1.8rem;font-weight:800;color:var(--donation);margin-bottom:16px}
.don-card button,.comp-card button{border:none;border-radius:12px;padding:11px 28px;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s}
.don-card button{background:linear-gradient(135deg,var(--donation),#ff8fa3);color:#fff}
.comp-card{background:linear-gradient(135deg,var(--card),#0f1d35);border:1.5px solid rgba(0,228,160,0.3)}
.comp-card .c-icon{font-size:3.5rem;margin-bottom:10px}
.comp-card h2{font-size:1.5rem;font-weight:700;margin-bottom:6px;color:var(--accent)}
.comp-card p{color:var(--text-dim);font-size:.85rem;margin-bottom:6px;line-height:1.6}
.c-stats{display:flex;justify-content:center;gap:20px;margin:16px 0}
.c-stat{text-align:center}
.cs-val{font-size:1.6rem;font-weight:800;color:var(--accent)}
.cs-lab{font-size:.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.comp-card button{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);margin-top:6px}

/* Name & Settings */
.name-bar{display:flex;gap:8px;margin-bottom:14px;width:100%;align-items:center}
.name-input{flex:1;background:var(--card);border:1.5px solid var(--card-border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s}
.name-input:focus{border-color:var(--accent)}
.name-input::placeholder{color:var(--text-dim)}
.settings-btn{background:var(--card);border:1.5px solid var(--card-border);border-radius:12px;padding:10px 12px;color:var(--text-dim);font-size:1rem;cursor:pointer;transition:all .2s}
.settings-btn:hover{border-color:var(--accent);color:var(--accent)}
.settings-panel{display:none;background:var(--card);border:1.5px solid var(--card-border);border-radius:14px;padding:14px;margin-bottom:14px;width:100%}
.settings-panel.show{display:block;animation:fu .3s ease}
.settings-panel label{font-size:.8rem;color:var(--text-dim);display:block;margin-bottom:4px}
.settings-panel input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--card-border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:.8rem;outline:none;margin-bottom:10px}
.settings-panel input:focus{border-color:var(--accent)}
.settings-panel .save-btn{background:var(--accent);border:none;border-radius:8px;padding:8px 20px;color:var(--bg);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.settings-panel .save-btn:hover{opacity:.8}
.settings-panel .status{font-size:.75rem;color:var(--accent);margin-top:6px}

/* Mode tabs */
.mode-tabs{display:flex;gap:8px;margin-bottom:18px;width:100%}
.mode-tab{flex:1;padding:12px;border-radius:14px;border:1.5px solid var(--card-border);background:var(--card);color:var(--text-dim);font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .25s;text-align:center}
.mode-tab.active{border-color:var(--accent);background:rgba(0,228,160,0.08);color:var(--accent)}
.mode-tab:hover:not(.active){border-color:rgba(255,255,255,0.3)}

/* Part 2 styles */
.p2-listen-area{text-align:center;margin-bottom:20px}
.p2-play-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:20px;padding:18px 36px;color:var(--bg);font-family:inherit;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,228,160,0.3)}
.p2-play-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,228,160,0.4)}
.p2-play-btn:active{transform:scale(0.97)}
.p2-play-btn.playing{animation:pulse .8s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(0,228,160,0.3)}50%{box-shadow:0 4px 30px rgba(0,228,160,0.6)}}
.p2-play-icon{font-size:1.4rem}
.p2-hint{margin-top:12px;font-size:.8rem;color:var(--text-dim);font-style:italic;min-height:20px}
.p2-responses{width:100%;max-width:480px;display:flex;flex-direction:column;gap:9px}
.p2-resp{width:100%;background:var(--card);border:1.5px solid var(--card-border);border-radius:14px;padding:14px 18px;color:var(--text);font-family:inherit;font-size:.95rem;font-weight:500;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px}
.p2-resp .rn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:var(--text-dim);flex-shrink:0}
.p2-resp:hover:not(:disabled){border-color:rgba(0,228,160,0.4);background:rgba(0,228,160,0.05);transform:translateX(4px)}
.p2-resp:disabled{cursor:default}
.p2-resp.correct{border-color:var(--accent);background:rgba(0,228,160,0.1);box-shadow:0 0 20px var(--accent-glow)}
.p2-resp.correct .rn{background:var(--accent);color:var(--bg)}
.p2-resp.wrong{border-color:var(--danger);background:rgba(255,71,87,0.08);opacity:.7}

.particle{position:fixed;width:3px;height:3px;background:var(--accent);border-radius:50%;pointer-events:none;opacity:0;animation:pd 8s linear infinite}
@keyframes pd{0%{opacity:0;transform:translateY(100vh)}10%{opacity:.3}90%{opacity:.3}100%{opacity:0;transform:translateY(-20vh)}}

@media(max-width:600px){
  .logo-title{font-size:2.2rem}
  .level-grid{gap:8px}
  .q-word{font-size:1.7rem}
  .world{height:100px}
  .quiz-body{padding:12px 16px 20px}
  .q-counter{margin-bottom:6px}
  .q-word{font-size:1.5rem;margin-bottom:2px}
  .sound-btn{width:36px;height:36px;font-size:1rem;border-radius:10px}
  .q-pos{margin-bottom:12px;font-size:.75rem}
  .opt{padding:11px 14px;font-size:.9rem}
  .opts{gap:7px}
  .fb{margin-top:10px;min-height:32px}
  .fb-msg{font-size:.85rem}
  .nxt{margin-top:10px;padding:10px 30px;font-size:.9rem}
  .quiz-stats{gap:8px}
  .total-stats{gap:12px}
  .total-stat{padding:10px 14px;min-width:75px}
}
</style>
</head>
<body>

<div class="screen home-screen active" id="homeScreen">
  <div class="home-bg"></div>
  <div class="home-content">
    <span class="logo-icon">🌊</span>
    <div class="logo-title">DoVo</div>
    <div class="logo-sub">Donation Vocabulary</div>
    <div class="tagline">하루 15분, 토익 점수가 자라는 것을 보세요.<br><em>200 포인트</em>마다 기부 포인트를 얻습니다.</div>
    <div class="total-stats">
      <div class="total-stat"><div class="ts-val pts" id="totalPts">0</div><div class="ts-label">Total Points</div></div>
      <div class="total-stat"><div class="ts-val don" id="totalDon">0</div><div class="ts-label">Donation</div></div>
    </div>
    <div class="name-bar">
      <input type="text" class="name-input" id="nameInput" placeholder="이름을 입력하세요" maxlength="20">
      <button class="settings-btn" onclick="toggleSettings()" title="설정">⚙️</button>
    </div>
    <div class="settings-panel" id="settingsPanel">
      <label>Google Sheet URL (선생님이 제공)</label>
      <input type="text" id="sheetUrl" placeholder="https://script.google.com/macros/s/..." value="">
      <button class="save-btn" onclick="saveSettings()">저장</button>
      <div class="status" id="settingsStatus"></div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabVocab" onclick="switchTab('vocab')">📖 단어 학습</button>
      <button class="mode-tab" id="tabPart2" onclick="switchTab('part2')">🎧 Part 2</button>
    </div>
    <div id="vocabPanel">
      <div class="level-grid" id="levelGrid"></div>
    </div>
    <div id="part2Panel" style="display:none">
      <div class="level-grid" id="part2Grid"></div>
    </div>
    <div class="home-footer">DoVo — 점수를 만드는 단어 학습 경험</div>
  </div>
</div>

<div class="screen quiz-screen" id="quizScreen">
  <div class="quiz-top">
    <button class="back-btn" onclick="goHome()">← 홈</button>
    <div class="ql-center">
      <div class="ql-label" id="qlLabel">Level 1</div>
      <div class="ql-score" id="qlScore">목표: TOEIC 300점</div>
    </div>
    <div class="quiz-stats">
      <div class="stat"><div class="s-val" id="ptsDisp">0</div><div class="s-label">Points</div></div>
      <div class="stat don"><div class="s-val" id="donDisp">0</div><div class="s-label">Donation</div></div>
    </div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  <div class="world" id="world"></div>
  <div class="quiz-body">
    <div class="q-counter" id="qCnt">1 / 100</div>
    <div class="q-word-row"><span class="q-word" id="qWord">word</span><button class="sound-btn" onclick="speakWord()" title="발음 듣기">🔊</button></div>
    <div class="q-pos" id="qPos">noun</div>
    <div class="opts" id="opts"></div>
    <div class="fb"><div class="fb-msg" id="fbMsg"></div></div>
    <button class="nxt" id="nxtBtn" onclick="nextQ()">다음 문제 →</button>
  </div>
</div>

<!-- Part 2 Screen -->
<div class="screen quiz-screen" id="part2Screen">
  <div class="quiz-top">
    <button class="back-btn" onclick="goHome()">← 홈</button>
    <div class="ql-center">
      <div class="ql-label" id="p2Label">Part 2</div>
      <div class="ql-score" id="p2Score">질문-응답</div>
    </div>

function renderHome(){
  document.getElementById('totalPts').textContent=totalPts;
  document.getElementById('totalDon').textContent=totalDon+'원';
  const g=document.getElementById('levelGrid');
  g.innerHTML='';
  for(let lv=1;lv<=9;lv++){
    const d=V[lv],unlocked=lvUnlock[lv];
    const prog=lvProg[lv]||0;
    const pct=Math.min(100,Math.round((prog/d.words.length)*100));
    const cleared=pct>=100;
    const b=document.createElement('div');
    b.className='level-btn'+(unlocked?'':' locked')+(cleared?' cleared':'');
    b.innerHTML=`
      <div class="lv-num">${unlocked?(cleared?'✅ ':'')+(d.label||'Level '+lv):'🔒 '+(d.label||'Level '+lv)}</div>
      <div class="lv-score">${d.target>0?'TOEIC '+d.target+'점':'TOEIC LC'}</div>
      <div class="lv-desc">${d.desc}</div>
      <div class="lv-words">${d.words.length}단어 · ${prog}/${d.words.length} 완료</div>
      <div class="lv-progress"><div class="lv-bar" style="width:${pct}%"></div></div>`;
    if(unlocked) b.onclick=()=>startLevel(lv);
    g.appendChild(b);
  }
}

function startLevel(lv){
  curLv=lv;lvPts=0;qIdx=0;answered=false;wrongQ=[];wrongCount=0;retryMode=false;
  lvWords=[...V[lv].words];
  for(let i=lvWords.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[lvWords[i],lvWords[j]]=[lvWords[j],lvWords[i]]}
  document.getElementById('homeScreen').classList.remove('active');
  document.getElementById('quizScreen').classList.add('active');
  document.getElementById('qlLabel').textContent=V[lv].label||`Level ${lv}`;
  document.getElementById('qlScore').textContent=V[lv].target>0?`목표: TOEIC ${V[lv].target}점`:'TOEIC LC 듣기';
  initWorld();updateUI();loadQ();
}

function goHome(){
  document.getElementById('quizScreen').classList.remove('active');
  document.getElementById('homeScreen').classList.add('active');
  renderHome();
}

const oceanCreatures=['🐟','🐠','🐡','🦈','🐙','🦑','🐬','🐳','🦐','🦀','🐚','🪸','🦞','🐋','🪼','🐢'];
const forestTrees=['🌲','🌳','🌴','🎄','🌿','🍀'];
const forestFlowers=['🌸','🌺','🌻','🌷','💐','🌹','🌼'];
const forestAnimals=['🦌','🐰','🐿️','🦊','🦉','🐦','🦋','🐝','🐞','🐣','🦔','🐻'];

function isForest(){return curLv>=7}

function initWorld(){
  const w=document.getElementById('world');w.innerHTML='';
  w.className='world '+(isForest()?'forest-theme':'ocean-theme');
  
  if(isForest()){
    // Ground plants
    [5,15,30,50,70,85,95].forEach((pos,i)=>{
      const s=document.createElement('div');s.className='sw';
      s.textContent=['🌱','🌿','☘️','🌱','🌿','☘️','🌱'][i];
      s.style.left=pos+'%';s.style.fontSize=(20+Math.random()*10)+'px';
      s.style.animationDelay=Math.random()*2+'s';w.appendChild(s);
    });
    // Fireflies
    for(let i=0;i<6;i++){
      const f=document.createElement('div');f.className='firefly';
      f.style.left=Math.random()*90+'%';f.style.top=(10+Math.random()*60)+'%';
      f.style.animationDelay=Math.random()*6+'s';
      f.style.animationDuration=(4+Math.random()*4)+'s';
      w.appendChild(f);
    }
    // Falling leaves
    for(let i=0;i<4;i++){
      const l=document.createElement('div');l.className='leaf';
      l.textContent=['🍃','🍂','🍁','🍃'][i];
      l.style.left=Math.random()*90+'%';
      l.style.animationDuration=(6+Math.random()*6)+'s';
      l.style.animationDelay=Math.random()*8+'s';
      w.appendChild(l);
    }
  } else {
    // Ocean seaweed
    [5,20,45,68,85,95].forEach((pos,i)=>{
      const s=document.createElement('div');s.className='sw';
      s.textContent=i%2?'🌱':'🌿';
      s.style.left=pos+'%';s.style.fontSize=(26+Math.random()*12)+'px';
      s.style.animationDelay=Math.random()*2+'s';w.appendChild(s);
    });
    // Bubbles
    for(let i=0;i<8;i++){
      const b=document.createElement('div');b.className='ob';
      b.style.left=Math.random()*95+'%';b.style.bottom=Math.random()*15+'%';
      b.style.width=b.style.height=(3+Math.random()*5)+'px';
      b.style.animationDuration=(4+Math.random()*5)+'s';
      b.style.animationDelay=Math.random()*6+'s';w.appendChild(b);
    }
  }
}

function addCreature(){
  const w=document.getElementById('world'),c=document.createElement('div');
  c.className='oc oc-enter';
  
  if(isForest()){
    // Forest: mix of trees, flowers, animals
    const roll=Math.random();
    if(roll<0.4){
      // Tree
      c.textContent=forestTrees[Math.floor(Math.random()*forestTrees.length)];
      c.style.bottom='0';c.style.left=(3+Math.random()*90)+'%';
      c.style.fontSize=(24+Math.random()*20)+'px';c.style.top='auto';
      setTimeout(()=>{c.classList.remove('oc-enter');c.classList.add('sway-tree');c.style.animationDuration=(4+Math.random()*3)+'s'},600);
    } else if(roll<0.7){
      // Flower
      c.textContent=forestFlowers[Math.floor(Math.random()*forestFlowers.length)];
      c.style.bottom=(2+Math.random()*15)+'%';c.style.left=(5+Math.random()*85)+'%';
      c.style.fontSize=(14+Math.random()*12)+'px';c.style.top='auto';
      setTimeout(()=>{c.classList.remove('oc-enter');c.classList.add('sway-tree');c.style.animationDuration=(3+Math.random()*2)+'s'},600);
    } else {
      // Animal
      c.textContent=forestAnimals[Math.floor(Math.random()*forestAnimals.length)];
      c.style.left=(5+Math.random()*85)+'%';
      c.style.top=(20+Math.random()*50)+'%';
      c.style.fontSize=(18+Math.random()*14)+'px';
      setTimeout(()=>{c.classList.remove('oc-enter');c.classList.add('hop');c.style.animationDuration=(2+Math.random()*2)+'s'},600);
    }
  } else {
    // Ocean creatures
    c.textContent=oceanCreatures[Math.floor(Math.random()*oceanCreatures.length)];
    c.style.left=(5+Math.random()*85)+'%';
    c.style.top=(8+Math.random()*60)+'%';
    c.style.fontSize=(18+Math.random()*16)+'px';
    setTimeout(()=>{c.classList.remove('oc-enter');c.classList.add('swim');c.style.animationDuration=(3+Math.random()*3)+'s'},600);
  }
  
  w.appendChild(c);
}

function loadQ(){
  if(qIdx>=lvWords.length){
    // 틀린 문제가 있으면 다시 풀기
    if(wrongQ.length>0&&!retryMode){
      retryMode=true;
      lvWords=wrongQ.slice();
      wrongQ=[];
      qIdx=0;
      // Shuffle retry words
      for(let i=lvWords.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[lvWords[i],lvWords[j]]=[lvWords[j],lvWords[i]]}
      document.getElementById('fbMsg').innerHTML=`<span style="color:var(--gold)">📝 틀린 ${lvWords.length}문제 다시 풀기!</span>`;
      document.getElementById('nxtBtn').textContent='다시 풀기 시작 →';
      document.getElementById('nxtBtn').classList.add('show');
      return;
    }
    showComplete();return;
  }
  answered=false;
  document.getElementById('nxtBtn').classList.remove('show');
  document.getElementById('nxtBtn').textContent='다음 문제 →';
  document.getElementById('fbMsg').textContent='';
  const w=lvWords[qIdx];
  document.getElementById('qWord').textContent=w.e;
  document.getElementById('qPos').textContent=w.p==='n'?'noun':w.p==='v'?'verb':w.p==='adj'?'adjective':w.p==='adv'?'adverb':w.p;
  const label=retryMode?'재시험':'';
  document.getElementById('qCnt').textContent=`${retryMode?'🔄 ':''}${qIdx+1} / ${lvWords.length}${wrongCount>0?' · ❌ '+wrongCount+'문제 오답':''}`;
  const list=document.getElementById('opts');list.innerHTML='';
  const labels=['A','B','C','D'];
  w.o.forEach((opt,i)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=`<span class="on">${labels[i]}</span><span>${opt}</span>`;
    b.onclick=()=>selAns(i,b);list.appendChild(b);
  });
}

let autoTimer=null; // 자동 넘김 타이머 관리

function selAns(idx,btn){
  if(answered)return;answered=true;
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  const w=lvWords[qIdx],btns=document.querySelectorAll('.opt');
  btns.forEach(b=>{b.disabled=true;b.style.pointerEvents='none'});
  if(idx===w.a){
    btn.classList.add('correct');
    lvPts+=10;totalPts+=10;addCreature();
    if(lvPts>0&&lvPts%200===0){totalDon+=100;setTimeout(()=>showDon(),600)}
    const msgs=['정답! ✨','훌륭해요! 🎉','맞았어요! ⭐','완벽! 💫','대단해요! 🌟'];
    document.getElementById('fbMsg').innerHTML=`<span style="color:var(--accent)">${msgs[Math.floor(Math.random()*msgs.length)]}</span> +10 points`;
    qIdx++;if(!retryMode)lvProg[curLv]=Math.max(lvProg[curLv],qIdx);
    updateUI();saveProgress();
    // 10문제마다 중간 기록 전송
    if(qIdx%10===0&&qIdx<lvWords.length){
      const midAcc=Math.round((lvPts/(qIdx*10))*100);
      sendToSheet('단어(진행중)',(V[curLv].label||'Level '+curLv)+' '+qIdx+'문제',lvPts,midAcc,wrongCount,totalDon);
    }
    // 정답이면 1초 후 자동으로 다음 문제
    autoTimer=setTimeout(()=>{autoTimer=null;loadQ()},1000);
  } else {
    btn.classList.add('wrong');btns[w.a].classList.add('correct');
    wrongQ.push(w);
    wrongCount++;
    document.getElementById('fbMsg').innerHTML=`<span style="color:var(--danger)">오답 (❌${wrongCount})</span> — 정답: <strong>${w.o[w.a]}</strong>`;
    qIdx++;if(!retryMode)lvProg[curLv]=Math.max(lvProg[curLv],qIdx);
    updateUI();saveProgress();
    // 오답이면 버튼 눌러야 다음으로
    document.getElementById('nxtBtn').classList.add('show');
  }
}

// TTS - 단어 발음
function speakWord(){
  const word=document.getElementById('qWord').textContent;
  if(!word||!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word);
  u.rate=0.8;u.pitch=1;
  // 단어도 다양한 음성으로
  const voice=getRandomEnVoice();
  if(voice){u.voice=voice;u.lang=voice.lang;}else{u.lang='en-US';}
  const btn=document.querySelector('.sound-btn');
  if(btn){btn.classList.add('playing');
  u.onend=()=>btn.classList.remove('playing');
  u.onerror=()=>btn.classList.remove('playing');}
  window.speechSynthesis.speak(u);
}

// Collect high-quality English voices only
let enVoices=[];
// Known bad voices to exclude (old robotic Apple voices etc.)
const BAD_VOICES=['fred','albert','ralph','bad news','bahh','bells','boing','bubbles',
  'cellos','deranged','good news','hysterical','junior','kathy','organ','princess',
  'trinoids','whisper','zarvox','agnes','bruce old','victoria old','pipe organ',
  'jester','superstar','wobble','flo','grandma','grandpa','reed','rocko','sandy','shelley'];

function loadEnVoices(){
  const all=window.speechSynthesis.getVoices();
  // Filter: English only, exclude known bad voices
  let good=all.filter(v=>{
    if(!v.lang.startsWith('en'))return false;
    const name=v.name.toLowerCase();
    // Exclude known bad/novelty voices
    if(BAD_VOICES.some(b=>name.includes(b)))return false;
    return true;
  });
  // Prefer premium/enhanced voices (Google, Microsoft, Apple enhanced)
  const premium=good.filter(v=>{
    const n=v.name.toLowerCase();
    return n.includes('google')||n.includes('microsoft')||n.includes('enhanced')||
           n.includes('premium')||n.includes('natural')||n.includes('neural')||
           n.includes('samantha')||n.includes('daniel')||n.includes('karen')||
           n.includes('moira')||n.includes('tessa')||n.includes('rishi')||
           n.includes('aaron')||n.includes('nicky')||n.includes('allison')||
           n.includes('ava')||n.includes('tom')||n.includes('kate')||
           n.includes('oliver')||n.includes('stephanie')||n.includes('zoe');
  });
  enVoices=premium.length>=2?premium:good;
  if(enVoices.length===0)enVoices=all.filter(v=>v.lang.startsWith('en'));
}
if('speechSynthesis' in window){
  loadEnVoices();
  speechSynthesis.onvoiceschanged=loadEnVoices;
}

function getRandomEnVoice(){
  if(enVoices.length===0)loadEnVoices();
  if(enVoices.length===0)return null;
  return enVoices[Math.floor(Math.random()*enVoices.length)];
}

function playP2Question(){
  if(!('speechSynthesis' in window))return;
  const qd=p2Words[p2Idx];
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(qd.q);
  u.rate=0.85;u.pitch=1;
  // 매 문제마다 다른 음성 (미국/영국/호주, 남/여 랜덤)
  const voice=getRandomEnVoice();
  if(voice){u.voice=voice;u.lang=voice.lang;}else{u.lang='en-US';}
  const btn=document.getElementById('p2PlayBtn');
  btn.classList.add('playing');
  u.onend=()=>{btn.classList.remove('playing');document.getElementById('p2Hint').textContent='다시 듣기: 버튼을 누르세요'};
  u.onerror=()=>btn.classList.remove('playing');
  window.speechSynthesis.speak(u);
  document.getElementById('p2Hint').textContent='🔊 듣는 중...';
}

let p2AutoTimer=null;

function selP2Ans(idx,btn){
  if(p2Answered)return;p2Answered=true;
  if(p2AutoTimer){clearTimeout(p2AutoTimer);p2AutoTimer=null;}
  const qd=p2Words[p2Idx],btns=document.querySelectorAll('.p2-resp');
  btns.forEach(b=>{b.disabled=true;b.style.pointerEvents='none'});
  if(idx===qd.a){
    btn.classList.add('correct');
    p2Pts+=10;totalPts+=10;
    if(p2Pts>0&&p2Pts%200===0){totalDon+=100;setTimeout(()=>showDon(),600)}
    const w=document.getElementById('p2World'),c=document.createElement('div');
    c.className='oc oc-enter';c.textContent=oceanCreatures[Math.floor(Math.random()*oceanCreatures.length)];
    c.style.left=(5+Math.random()*85)+'%';c.style.top=(8+Math.random()*60)+'%';c.style.fontSize=(18+Math.random()*16)+'px';
    setTimeout(()=>{c.classList.remove('oc-enter');c.classList.add('swim');c.style.animationDuration=(3+Math.random()*3)+'s'},600);
    w.appendChild(c);
    document.getElementById('p2FbMsg').innerHTML=`<span style="color:var(--accent)">정답! ✨</span> +10 points`;
    document.getElementById('p2Hint').textContent=`💬 "${qd.q}"`;
    p2Idx++;if(!p2RetryMode)p2Prog[p2Lv]=Math.max(p2Prog[p2Lv],p2Idx);
    updateP2UI();saveProgress();
    p2AutoTimer=setTimeout(()=>{p2AutoTimer=null;loadP2()},1000);
  } else {
    btn.classList.add('wrong');btns[qd.a].classList.add('correct');
    p2WrongQ.push(qd);p2WrongCount++;
    document.getElementById('p2FbMsg').innerHTML=`<span style="color:var(--danger)">오답 (❌${p2WrongCount})</span>`;
    document.getElementById('p2Hint').textContent='🔊 다시 들으려면 버튼을 누르세요';
    // 오답 시 재생 버튼 활성 유지 - 다시 들을 수 있음
    document.getElementById('p2PlayBtn').onclick=function(){
      if(!('speechSynthesis' in window))return;
      window.speechSynthesis.cancel();
      const u2=new SpeechSynthesisUtterance(qd.q);
      u2.rate=0.8;u2.pitch=1;
      const voice=getRandomEnVoice();
      if(voice){u2.voice=voice;u2.lang=voice.lang;}else{u2.lang='en-US';}
      const pb=document.getElementById('p2PlayBtn');
      pb.classList.add('playing');
      u2.onend=()=>{pb.classList.remove('playing');document.getElementById('p2Hint').textContent=`💬 "${qd.q}"`};
      u2.onerror=()=>pb.classList.remove('playing');
      window.speechSynthesis.speak(u2);
      document.getElementById('p2Hint').textContent='🔊 듣는 중...';
    };
    p2Idx++;if(!p2RetryMode)p2Prog[p2Lv]=Math.max(p2Prog[p2Lv],p2Idx);
    updateP2UI();saveProgress();
    document.getElementById('p2NxtBtn').classList.add('show');
  }
}
function nextP2(){loadP2()}
function updateP2UI(){
  document.getElementById('p2PtsDisp').textContent=p2Pts;
  document.getElementById('p2DonDisp').textContent=totalDon+'원';
  document.getElementById('p2ProgFill').style.width=(p2Idx/p2Words.length*100)+'%';
}
function showP2Complete(){
  const d=P2[p2Lv],acc=Math.round((p2Pts/(p2Words.length*10))*100);
  sendToSheet('Part 2',d.label,p2Pts,acc,p2WrongCount,totalDon);
  saveProgress();
  const ov=document.createElement('div');ov.className='ov';
  ov.innerHTML=`<div class="ov-card comp-card">
    <div class="c-icon">🎧</div><h2>${d.label} 클리어!</h2>
    <p>Part 2 연습을 완료했어요!</p>
    <div class="c-stats">
      <div class="c-stat"><div class="cs-val">${p2Pts}</div><div class="cs-lab">Points</div></div>
      <div class="c-stat"><div class="cs-val">${acc}%</div><div class="cs-lab">정답률</div></div>
      <div class="c-stat"><div class="cs-val">${totalDon}원</div><div class="cs-lab">기부금</div></div>
    </div>
    <p style="color:var(--text-dim);font-size:.85rem">${p2WrongCount>0?'❌ 오답 '+p2WrongCount+'문제':'✨ 전문 정답!'}</p>
    <button onclick="this.closest('.ov').remove();goHome();">홈으로 돌아가기</button>
  </div>`;document.body.appendChild(ov);
}

// Override goHome to handle Part 2 screen
const _origGoHome=goHome;
goHome=function(){
  document.getElementById('part2Screen').classList.remove('active');
  _origGoHome();
}

renderHome();
initNameSettings();
</script>

<script>
// iOS standalone mode - prevent links from opening Safari
if (window.navigator.standalone) {
  document.addEventListener('click', function(e) {
    var node = e.target;
    while (node && node !== document) {
      if (node.tagName === 'A') { e.preventDefault(); window.location = node.href; return; }
      node = node.parentNode;
    }
  }, false);
}
